<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLANET STYLE LAB</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #010a03;
    --panel: #030f05;
    --green: #00ff41;
    --green-dim: #00aa2a;
    --green-dark: #004a10;
    --green-faint: #001a06;
    --amber: #ffaa00;
    --cyan: #00ffee;
    --red: #ff2244;
    --blue: #0088ff;
    --orange: #ff6600;
    --white: #c8ffd0;
    --muted: #1a5028;
    --border: #0a3015;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    cursor: crosshair;
    min-height: 100vh;
  }

  /* Scan lines overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .page-header {
    text-align: center;
    padding: 48px 20px 36px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .page-header::before {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }
  .page-header .sub {
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .page-header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 4vw, 36px);
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--green);
    text-shadow: 0 0 20px var(--green), 0 0 50px rgba(0,255,65,0.3);
  }
  .page-header p {
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    padding: 36px 28px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--green-dim);
    box-shadow: 0 0 24px rgba(0,255,65,0.1);
  }
  .card canvas {
    display: block;
  }

  .card-label {
    width: 100%;
  }
  .card-label .pname {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--green);
    margin-bottom: 4px;
  }
  .card-label .pdesc {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    line-height: 1.6;
  }

  .tag {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 8px;
    letter-spacing: 2px;
    padding: 2px 7px;
    border: 1px solid;
    text-transform: uppercase;
  }
  .tag-color  { color: var(--cyan);   border-color: var(--cyan);   }
  .tag-rings  { color: var(--amber);  border-color: var(--amber);  }
  .tag-pcb    { color: var(--green);  border-color: var(--green);  }
  .tag-star   { color: #ffdd44;       border-color: #ffdd44;       }
  .tag-dead   { color: var(--muted);  border-color: var(--muted);  }
  .tag-gas    { color: var(--orange); border-color: var(--orange); }
  .tag-moon   { color: #aabbcc;       border-color: #aabbcc;       }
  .tag-alien  { color: #cc44ff;       border-color: #cc44ff;       }
</style>
</head>
<body>

<div class="page-header">
  <div class="sub">CELESTIAL BODY DESIGN LAB // CONCEPT REVIEW</div>
  <h1>PLANET STYLE CATALOGUE</h1>
  <p>HOVER TO ANIMATE · SELECT ELEMENTS YOU LIKE FOR FINAL BUILD</p>
</div>

<div class="grid" id="grid"></div>

<script>
// ─── Utility ────────────────────────────────────────────────────────────────
function rng(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

// ─── Planet definitions ──────────────────────────────────────────────────────
// Each planet: { name, desc, tag, tagClass, animate (optional), draw(ctx,cx,cy,r,t) }

const SIZE = 160;
const R = 62;

const PLANETS = [

  // 1. PCB CIRCUIT WORLD
  {
    name: 'CIRCUIT WORLD',
    desc: 'PCB trace lines routed across sphere · via holes · right-angle paths · pure green matrix',
    tag: 'PCB', tagClass: 'tag-pcb',
    draw(ctx, cx, cy, r, t) {
      const rand = rng(42);
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 1.2;
      // Globe outline
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
      // Latitude lines (scanline style)
      for (let i = -4; i <= 4; i++) {
        const y = cy + i*(r/4.5);
        const dx = Math.sqrt(Math.max(0, r*r - (y-cy)*(y-cy)));
        if (dx < 2) continue;
        ctx.beginPath(); ctx.moveTo(cx-dx, y); ctx.lineTo(cx+dx, y); ctx.stroke();
      }
      // PCB traces (right-angle routes)
      ctx.lineWidth = 1.5;
      const traces = [
        [[cx-r*0.5, cy-r*0.3],[cx-r*0.1,cy-r*0.3],[cx-r*0.1,cy+r*0.1],[cx+r*0.4,cy+r*0.1]],
        [[cx+r*0.2, cy-r*0.5],[cx+r*0.2,cy-r*0.1],[cx-r*0.3,cy-r*0.1]],
        [[cx-r*0.4, cy+r*0.3],[cx+r*0.1,cy+r*0.3],[cx+r*0.1,cy+r*0.5]],
        [[cx+r*0.45,cy+r*0.25],[cx+r*0.45,cy-r*0.2],[cx-r*0.05,cy-r*0.2]],
      ];
      traces.forEach(pts => {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.clip();
        ctx.beginPath();
        pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
        ctx.stroke();
        ctx.restore();
      });
      // Via holes
      ctx.lineWidth = 1;
      [[cx-r*0.1,cy-r*0.3],[cx-r*0.1,cy+r*0.1],[cx+r*0.4,cy+r*0.1],[cx+r*0.2,cy-r*0.1],[cx+r*0.45,cy-r*0.2]].forEach(([vx,vy]) => {
        const inCircle = Math.sqrt((vx-cx)**2+(vy-cy)**2) < r-3;
        if (!inCircle) return;
        ctx.beginPath(); ctx.arc(vx,vy,4,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(vx,vy,2,0,Math.PI*2); ctx.stroke();
      });
    }
  },

  // 2. OCEAN WORLD — color water + land masses
  {
    name: 'OCEANUS',
    desc: 'Water world · cyan ocean fill · green landmass polygons · scanline latitude rings',
    tag: 'COLOR', tagClass: 'tag-color',
    draw(ctx, cx, cy, r, t) {
      const rand = rng(7);
      // Ocean fill
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle = 'rgba(0,100,180,0.35)';
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      // Land masses
      const continents = [
        [cx-r*0.3, cy-r*0.2, r*0.35],
        [cx+r*0.2, cy+r*0.1, r*0.28],
        [cx-r*0.1, cy+r*0.35, r*0.2],
      ];
      continents.forEach(([lx,ly,lr]) => {
        ctx.beginPath();
        ctx.arc(lx,ly,lr,0,Math.PI*2);
        ctx.fillStyle = 'rgba(0,180,60,0.3)';
        ctx.fill();
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      ctx.restore();
      // Globe ring
      ctx.strokeStyle = '#00ffee';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Latitude lines
      ctx.strokeStyle = 'rgba(0,255,238,0.25)';
      ctx.lineWidth = 0.8;
      for (let i = -3; i <= 3; i++) {
        const y = cy + i*(r/3.5);
        const dx = Math.sqrt(Math.max(0, r*r-(y-cy)**2));
        ctx.beginPath(); ctx.moveTo(cx-dx,y); ctx.lineTo(cx+dx,y); ctx.stroke();
      }
      // Polar ice caps
      ctx.strokeStyle = '#aaffee';
      ctx.lineWidth = 1;
      for (const pole of [-1,1]) {
        const py = cy + pole*r*0.82;
        const pdx = Math.sqrt(Math.max(0,r*r-(py-cy)**2));
        ctx.beginPath(); ctx.moveTo(cx-pdx,py); ctx.lineTo(cx+pdx,py); ctx.stroke();
      }
    }
  },

  // 3. MARS — red desert, craters, dust storms
  {
    name: 'IRON MARS',
    desc: 'Red desert world · crater rings · polar ice line · rusty trace dust paths',
    tag: 'COLOR', tagClass: 'tag-color',
    draw(ctx, cx, cy, r, t) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle = 'rgba(180,40,0,0.2)';
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      // Dust band
      ctx.fillStyle = 'rgba(220,80,0,0.15)';
      ctx.fillRect(cx-r, cy-r*0.1, r*2, r*0.35);
      ctx.restore();
      ctx.strokeStyle = '#ff4422';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Craters
      ctx.lineWidth = 1;
      [[cx-r*0.3,cy-r*0.1,r*0.18],[cx+r*0.25,cy+r*0.3,r*0.13],[cx-r*0.1,cy+r*0.45,r*0.09],[cx+r*0.4,cy-r*0.25,r*0.1]].forEach(([ox,oy,cr]) => {
        if (Math.sqrt((ox-cx)**2+(oy-cy)**2)+cr > r) return;
        ctx.beginPath(); ctx.arc(ox,oy,cr,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(ox,oy,cr*0.35,0,Math.PI*2); ctx.stroke();
      });
      // Polar ice
      ctx.strokeStyle = '#ffaaaa';
      ctx.lineWidth = 1;
      const py = cy - r*0.8;
      const pdx = Math.sqrt(Math.max(0,r*r-(py-cy)**2));
      ctx.beginPath(); ctx.moveTo(cx-pdx,py); ctx.lineTo(cx+pdx,py); ctx.stroke();
      // Lat lines
      ctx.strokeStyle = 'rgba(255,68,34,0.3)';
      ctx.lineWidth = 0.7;
      for (let i=-2;i<=2;i++) { const y=cy+i*(r/3); const dx=Math.sqrt(Math.max(0,r*r-(y-cy)**2)); ctx.beginPath();ctx.moveTo(cx-dx,y);ctx.lineTo(cx+dx,y);ctx.stroke(); }
    }
  },

  // 4. GAS GIANT — Jupiter style, banded + swirl storm
  {
    name: 'JOVE GIANT',
    desc: 'Gas giant · horizontal band system · great storm eye · amber & orange colors',
    tag: 'GAS', tagClass: 'tag-gas',
    draw(ctx, cx, cy, r, t) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      // Bands
      const bands = [
        [0,    r*0.15, 'rgba(200,80,0,0.35)'],
        [r*0.15,r*0.1, 'rgba(255,140,0,0.2)'],
        [r*0.25,r*0.15,'rgba(180,60,0,0.3)'],
        [r*0.4, r*0.12,'rgba(255,100,20,0.25)'],
        [r*0.52,r*0.18,'rgba(200,70,0,0.3)'],
        [r*0.7, r*0.3, 'rgba(160,50,0,0.2)'],
      ];
      bands.forEach(([offset, height, col]) => {
        ctx.fillStyle = col;
        ctx.fillRect(cx-r, cy-r+offset, r*2, height);
        ctx.fillRect(cx-r, cy-offset-height, r*2, height);
      });
      // Storm eye
      ctx.strokeStyle = '#ffaa44';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(cx+r*0.2, cy+r*0.18, r*0.18, r*0.11, 0, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(cx+r*0.2, cy+r*0.18, r*0.08, r*0.05, 0, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
      ctx.strokeStyle = '#ff8800';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    }
  },

  // 5. SATURN RINGS
  {
    name: 'RING WORLD',
    desc: 'Saturn-style ring system · ring planes drawn as PCB bus traces · tilt perspective',
    tag: 'RINGS', tagClass: 'tag-rings',
    draw(ctx, cx, cy, r, t) {
      // Back rings
      ctx.strokeStyle = 'rgba(255,170,0,0.35)';
      ctx.lineWidth = 1;
      for (let i=0;i<3;i++) {
        const rr = r*1.3 + i*r*0.18;
        ctx.beginPath(); ctx.ellipse(cx,cy,rr,rr*0.28,0,Math.PI,Math.PI*2); ctx.stroke();
      }
      // Planet
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle = 'rgba(255,160,40,0.15)';
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      // horizontal bands
      ctx.strokeStyle = 'rgba(255,170,0,0.3)';
      ctx.lineWidth = 0.8;
      for (let i=-4;i<=4;i++) { const y=cy+i*(r/5); const dx=Math.sqrt(Math.max(0,r*r-(y-cy)**2)); if(dx>2){ctx.beginPath();ctx.moveTo(cx-dx,y);ctx.lineTo(cx+dx,y);ctx.stroke();} }
      ctx.restore();
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Front rings
      ctx.strokeStyle = 'rgba(255,170,0,0.6)';
      ctx.lineWidth = 1.2;
      for (let i=0;i<3;i++) {
        const rr = r*1.3 + i*r*0.18;
        ctx.beginPath(); ctx.ellipse(cx,cy,rr,rr*0.28,0,0,Math.PI); ctx.stroke();
      }
      // Ring tick marks (PCB bus style)
      ctx.strokeStyle = 'rgba(255,170,0,0.5)';
      ctx.lineWidth = 1;
      for (let a=0;a<Math.PI;a+=Math.PI/12) {
        const rr = r*1.35;
        const x1=cx+Math.cos(a)*rr, y1=cy+Math.sin(a)*rr*0.28;
        const x2=cx+Math.cos(a)*(rr+6), y2=cy+Math.sin(a)*0.28*(rr+6);
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      }
    }
  },

  // 6. THE SUN — corona arcs, flare lines
  {
    name: 'SOL PRIME',
    desc: 'Star · radiating corona arcs · solar flares · hot white core · prominence loops',
    tag: 'STAR', tagClass: 'tag-star',
    draw(ctx, cx, cy, r, t) {
      // Corona rays
      ctx.strokeStyle = 'rgba(255,220,0,0.25)';
      ctx.lineWidth = 1;
      for (let i=0;i<24;i++) {
        const a = i*Math.PI*2/24 + t*0.3;
        const len = r*0.25 + Math.sin(i*1.7)*r*0.15;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
        ctx.lineTo(cx+Math.cos(a)*(r+len), cy+Math.sin(a)*(r+len));
        ctx.stroke();
      }
      // Prominence loops
      ctx.strokeStyle = 'rgba(255,150,0,0.5)';
      ctx.lineWidth = 1.2;
      [[0.2,r*0.4],[2.8,r*0.3],[4.5,r*0.35]].forEach(([a,h]) => {
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, h*0.5, a+Math.PI, a+Math.PI*2);
        ctx.stroke();
      });
      // Core fill
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      grad.addColorStop(0,'rgba(255,255,200,0.5)');
      grad.addColorStop(0.5,'rgba(255,180,0,0.3)');
      grad.addColorStop(1,'rgba(255,100,0,0.1)');
      ctx.fillStyle = grad;
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      ctx.restore();
      ctx.strokeStyle = '#ffdd00';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    }
  },

  // 7. MOON — crater-heavy, topographic
  {
    name: 'DEAD LUNA',
    desc: 'Barren moon · topographic crater rings · offset center pits · no atmosphere',
    tag: 'MOON', tagClass: 'tag-moon',
    draw(ctx, cx, cy, r, t) {
      ctx.strokeStyle = '#8899aa';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Major craters with topo rings
      const craters = [
        [cx-r*0.25, cy-r*0.2, r*0.28],
        [cx+r*0.3, cy+r*0.25, r*0.22],
        [cx-r*0.05, cy+r*0.4, r*0.16],
        [cx+r*0.15, cy-r*0.5, r*0.14],
        [cx-r*0.55, cy+r*0.1, r*0.12],
      ];
      craters.forEach(([ox,oy,cr]) => {
        if (Math.sqrt((ox-cx)**2+(oy-cy)**2)+cr > r-2) return;
        for (let ring=1;ring>=0.3;ring-=0.35) {
          ctx.lineWidth = 0.8;
          ctx.beginPath(); ctx.arc(ox,oy,cr*ring,0,Math.PI*2); ctx.stroke();
        }
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(ox,oy,cr*0.15,0,Math.PI*2); ctx.stroke();
      });
      // Terminator line
      ctx.strokeStyle = 'rgba(136,153,170,0.4)';
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(cx+r*0.15, cy-r); ctx.bezierCurveTo(cx-r*0.3,cy-r*0.3,cx-r*0.3,cy+r*0.3,cx+r*0.15,cy+r); ctx.stroke();
    }
  },

  // 8. ICE WORLD
  {
    name: 'GLACIUS',
    desc: 'Frozen world · fractured ice sheet lines · cyan tint · tectonic crack network',
    tag: 'COLOR', tagClass: 'tag-color',
    draw(ctx, cx, cy, r, t) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle = 'rgba(0,160,200,0.12)';
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      ctx.restore();
      ctx.strokeStyle = '#00ffee';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Ice crack network
      ctx.lineWidth = 0.8;
      ctx.strokeStyle = 'rgba(0,255,238,0.6)';
      const cracks = [
        [[cx,cy-r*0.4],[cx+r*0.3,cy],[cx+r*0.1,cy+r*0.4]],
        [[cx,cy-r*0.4],[cx-r*0.4,cy-r*0.1],[cx-r*0.2,cy+r*0.35]],
        [[cx+r*0.3,cy],[cx+r*0.5,cy+r*0.2]],
        [[cx-r*0.2,cy+r*0.35],[cx+r*0.1,cy+r*0.4],[cx+r*0.35,cy+r*0.55]],
        [[cx-r*0.4,cy-r*0.1],[cx-r*0.55,cy+r*0.2]],
      ];
      cracks.forEach(pts => {
        ctx.save();
        ctx.beginPath(); ctx.arc(cx,cy,r-1,0,Math.PI*2); ctx.clip();
        ctx.beginPath();
        pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
        ctx.stroke();
        ctx.restore();
      });
      // Ice caps
      ctx.strokeStyle = 'rgba(200,255,255,0.8)';
      ctx.lineWidth = 1;
      [-1,1].forEach(pole => {
        const py = cy + pole*r*0.75;
        const pdx = Math.sqrt(Math.max(0,r*r-(py-cy)**2));
        ctx.beginPath(); ctx.moveTo(cx-pdx,py); ctx.lineTo(cx+pdx,py); ctx.stroke();
      });
    }
  },

  // 9. LAVA WORLD
  {
    name: 'INFERNUS',
    desc: 'Volcanic world · lava vein network · glowing fissure lines · magma color',
    tag: 'COLOR', tagClass: 'tag-color',
    draw(ctx, cx, cy, r, t) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle = 'rgba(150,20,0,0.3)';
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      ctx.restore();
      ctx.strokeStyle = '#ff3300';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Lava veins
      ctx.strokeStyle = '#ff6600';
      ctx.lineWidth = 1;
      const veins = [
        [[cx,cy],[cx+r*0.4,cy-r*0.2],[cx+r*0.55,cy-r*0.55]],
        [[cx,cy],[cx-r*0.35,cy+r*0.3],[cx-r*0.5,cy+r*0.6]],
        [[cx,cy],[cx+r*0.1,cy+r*0.5]],
        [[cx,cy],[cx-r*0.5,cy-r*0.3]],
        [[cx+r*0.4,cy-r*0.2],[cx+r*0.2,cy+r*0.35]],
      ];
      veins.forEach(pts => {
        ctx.save();
        ctx.beginPath(); ctx.arc(cx,cy,r-1,0,Math.PI*2); ctx.clip();
        ctx.beginPath();
        pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
        ctx.stroke();
        ctx.restore();
      });
      // Hot spots
      ctx.strokeStyle = '#ffaa00';
      [[cx+r*0.1,cy+r*0.15],[cx-r*0.25,cy-r*0.1],[cx+r*0.35,cy+r*0.3]].forEach(([ox,oy]) => {
        if (Math.sqrt((ox-cx)**2+(oy-cy)**2) > r-6) return;
        ctx.beginPath(); ctx.arc(ox,oy,5,0,Math.PI*2); ctx.stroke();
      });
    }
  },

  // 10. HEX GRID SPHERE
  {
    name: 'HEXWORLD',
    desc: 'Icosphere hex grid · triangulated surface · technical alien geometry · pure PCB green',
    tag: 'PCB', tagClass: 'tag-pcb',
    draw(ctx, cx, cy, r, t) {
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      // Hex grid projected onto sphere
      const hexR = r * 0.22;
      const hexW = hexR * 2;
      const hexH = Math.sqrt(3) * hexR;
      for (let row = -3; row <= 3; row++) {
        for (let col = -3; col <= 3; col++) {
          const hx = cx + col * hexW * 0.75;
          const hy = cy + row * hexH + (col % 2 === 0 ? 0 : hexH / 2);
          const dist = Math.sqrt((hx-cx)**2+(hy-cy)**2);
          if (dist > r * 0.9) continue;
          const scale = Math.sqrt(1 - Math.min(1,(dist/(r*0.95))**2)) * 0.85 + 0.15;
          ctx.lineWidth = 0.8 * scale;
          ctx.globalAlpha = 0.4 + 0.6*scale;
          ctx.beginPath();
          for (let v=0;v<6;v++) {
            const a = Math.PI/6 + v*Math.PI/3;
            const vx = hx + Math.cos(a)*hexR*scale*0.85;
            const vy = hy + Math.sin(a)*hexR*scale*0.85;
            v===0 ? ctx.moveTo(vx,vy) : ctx.lineTo(vx,vy);
          }
          ctx.closePath();
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  },

  // 11. PURPLE ALIEN WORLD
  {
    name: 'XENON-7',
    desc: 'Alien biosphere · purple land masses · bioluminescent coast lines · exotic atmosphere',
    tag: 'ALIEN', tagClass: 'tag-alien',
    draw(ctx, cx, cy, r, t) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle = 'rgba(40,0,80,0.4)';
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      // Alien landmasses
      [[cx-r*0.2,cy-r*0.3,r*0.38],[cx+r*0.3,cy+r*0.2,r*0.25],[cx-r*0.4,cy+r*0.35,r*0.2]].forEach(([lx,ly,lr]) => {
        ctx.beginPath(); ctx.arc(lx,ly,lr,0,Math.PI*2);
        ctx.fillStyle = 'rgba(120,0,200,0.25)'; ctx.fill();
        ctx.strokeStyle = '#cc44ff'; ctx.lineWidth = 1; ctx.stroke();
      });
      ctx.restore();
      ctx.strokeStyle = '#cc44ff';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Atmosphere haze
      ctx.strokeStyle = 'rgba(180,0,255,0.2)';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(cx,cy,r+3,0,Math.PI*2); ctx.stroke();
      // Lat lines
      ctx.strokeStyle = 'rgba(204,68,255,0.25)';
      ctx.lineWidth = 0.7;
      for (let i=-3;i<=3;i++) { const y=cy+i*(r/3.5); const dx=Math.sqrt(Math.max(0,r*r-(y-cy)**2)); if(dx>2){ctx.beginPath();ctx.moveTo(cx-dx,y);ctx.lineTo(cx+dx,y);ctx.stroke();} }
    }
  },

  // 12. SCANLINE SHADED GLOBE
  {
    name: 'SCANWORLD',
    desc: 'Pure scanline shading · varying density fakes 3D depth · no color, all technique',
    tag: 'PCB', tagClass: 'tag-pcb',
    draw(ctx, cx, cy, r, t) {
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      // Variable-density scanlines for shading
      for (let y = cy - r; y <= cy + r; y += 3.5) {
        const dy = y - cy;
        const dx = Math.sqrt(Math.max(0, r*r - dy*dy));
        if (dx < 1) continue;
        // Light from top-left: denser lines = darker
        const shade = (dy/r + 0.5) * 0.6 + 0.2;
        const gap = 3.5 / Math.max(0.3, shade);
        // Only draw lines that fall in the scanline rhythm
        const lineIndex = Math.round((y - (cy-r)) / 3.5);
        const drawMod = Math.max(1, Math.round(1 / shade));
        if (lineIndex % drawMod !== 0) continue;
        ctx.lineWidth = 0.7;
        ctx.strokeStyle = `rgba(0,255,65,${Math.min(1, shade * 1.2)})`;
        ctx.beginPath(); ctx.moveTo(cx-dx, y); ctx.lineTo(cx+dx, y); ctx.stroke();
      }
      ctx.restore();
    }
  },

  // 13. DATA WORLD — binary/text surface
  {
    name: 'DATA SPHERE',
    desc: 'Matrix rain on a globe · binary surface texture · terminal green · pure matrix aesthetic',
    tag: 'PCB', tagClass: 'tag-pcb',
    draw(ctx, cx, cy, r, t) {
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.font = '7px Share Tech Mono';
      ctx.textAlign = 'center';
      const chars = '01アイウエカキクケサシスセタチツテナニヌネ';
      const rand = rng(99);
      for (let col = cx - r + 6; col < cx + r; col += 9) {
        for (let row = cy - r + 8; row < cy + r; row += 10) {
          const dist = Math.sqrt((col-cx)**2+(row-cy)**2);
          if (dist > r - 4) continue;
          const alpha = 0.2 + rand()*0.6;
          ctx.fillStyle = `rgba(0,255,65,${alpha})`;
          ctx.fillText(chars[Math.floor(rand()*chars.length)], col, row);
        }
      }
      ctx.restore();
    }
  },

  // 14. RINGED GAS GIANT — detailed colored
  {
    name: 'KRONOS',
    desc: 'Ringed gas giant · multiple ring planes · colored bands · debris field particles',
    tag: 'RINGS', tagClass: 'tag-rings',
    draw(ctx, cx, cy, r, t) {
      // Back rings — extended
      const ringColors = ['rgba(200,150,50,0.3)','rgba(180,120,30,0.4)','rgba(220,170,80,0.2)','rgba(160,100,20,0.35)'];
      ringColors.forEach((col, i) => {
        const rr = r * (1.25 + i * 0.15);
        ctx.strokeStyle = col;
        ctx.lineWidth = i === 1 ? 3 : 1.2;
        ctx.beginPath(); ctx.ellipse(cx, cy, rr, rr*0.22, 0, Math.PI, Math.PI*2); ctx.stroke();
      });
      // Planet
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      const bcolors = ['rgba(255,150,50,0.3)','rgba(200,100,20,0.25)','rgba(255,180,80,0.2)','rgba(180,80,10,0.3)'];
      bcolors.forEach((col,i) => {
        ctx.fillStyle = col;
        const bh = r*0.25;
        const by = cy - r + i*(r*2/bcolors.length);
        ctx.fillRect(cx-r, by, r*2, bh);
      });
      ctx.restore();
      ctx.strokeStyle = '#cc8800';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Front rings
      ringColors.forEach((col, i) => {
        const rr = r * (1.25 + i * 0.15);
        ctx.strokeStyle = col.replace('0.3','0.6').replace('0.4','0.7').replace('0.2','0.5').replace('0.35','0.65');
        ctx.lineWidth = i === 1 ? 3 : 1.2;
        ctx.beginPath(); ctx.ellipse(cx, cy, rr, rr*0.22, 0, 0, Math.PI); ctx.stroke();
      });
      // Debris particles in rings
      ctx.fillStyle = 'rgba(255,180,50,0.5)';
      const rand = rng(33);
      for (let i=0;i<25;i++) {
        const a = rand()*Math.PI; // front half only
        const rr = r*(1.2 + rand()*0.5);
        const px = cx + Math.cos(a)*rr;
        const py = cy + Math.sin(a)*rr*0.22;
        ctx.beginPath(); ctx.arc(px, py, 1, 0, Math.PI*2); ctx.fill();
      }
    }
  },

  // 15. JUNGLE WORLD — green + bio
  {
    name: 'VERDANIA',
    desc: 'Dense jungle world · deep green canopy · water glints · bio-luminescent poles',
    tag: 'COLOR', tagClass: 'tag-color',
    draw(ctx, cx, cy, r, t) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle = 'rgba(0,80,10,0.4)';
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      // Deep jungle patches
      const rand = rng(55);
      for (let i=0;i<8;i++) {
        const a = rand()*Math.PI*2, d = rand()*r*0.7;
        const px = cx+Math.cos(a)*d, py = cy+Math.sin(a)*d;
        const pr = r*(0.12+rand()*0.2);
        ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);
        ctx.fillStyle = `rgba(0,${100+Math.floor(rand()*80)},0,0.3)`;
        ctx.fill();
      }
      // Oceans
      [[cx+r*0.35,cy-r*0.2,r*0.25],[cx-r*0.3,cy+r*0.3,r*0.2]].forEach(([lx,ly,lr]) => {
        ctx.beginPath(); ctx.arc(lx,ly,lr,0,Math.PI*2);
        ctx.fillStyle = 'rgba(0,100,180,0.3)'; ctx.fill();
        ctx.strokeStyle = '#00aaff'; ctx.lineWidth=0.8; ctx.stroke();
      });
      ctx.restore();
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Bio-glow at poles
      ctx.strokeStyle = 'rgba(0,255,100,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx,cy,r+2,Math.PI*1.3,Math.PI*1.7); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,r+2,Math.PI*0.3,Math.PI*0.7); ctx.stroke();
    }
  },

  // 16. DEAD ROCKBALL — asteroid-like polygon
  {
    name: 'DRIFTER',
    desc: 'Irregular asteroid · jagged polygon hull · no atmosphere · cratered surface texture',
    tag: 'DEAD', tagClass: 'tag-dead',
    draw(ctx, cx, cy, r, t) {
      const rand = rng(17);
      ctx.strokeStyle = '#336644';
      ctx.lineWidth = 1.5;
      // Irregular polygon outline
      const pts = [];
      const sides = 11;
      for (let i=0;i<sides;i++) {
        const a = i*Math.PI*2/sides - Math.PI/2;
        const d = r*(0.72 + rand()*0.28);
        pts.push([cx+Math.cos(a)*d, cy+Math.sin(a)*d]);
      }
      ctx.beginPath();
      pts.forEach((p,i) => i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
      ctx.closePath(); ctx.stroke();
      // Craters
      ctx.lineWidth = 0.8;
      [[cx-r*0.2,cy-r*0.15,r*0.15],[cx+r*0.2,cy+r*0.1,r*0.1],[cx-r*0.1,cy+r*0.3,r*0.08]].forEach(([ox,oy,cr]) => {
        ctx.beginPath(); ctx.arc(ox,oy,cr,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(ox,oy,cr*0.4,0,Math.PI*2); ctx.stroke();
      });
      // Surface hatch
      ctx.strokeStyle = 'rgba(51,102,68,0.4)';
      ctx.lineWidth = 0.6;
      for (let i=-3;i<=3;i++) {
        const y=cy+i*(r/4); const dx=r*0.65;
        ctx.beginPath(); ctx.moveTo(cx-dx,y); ctx.lineTo(cx+dx,y); ctx.stroke();
      }
    }
  },

  // 17. SPACE STATION MOON
  {
    name: 'STATION GAMMA',
    desc: 'Artificial moon · docking arms · solar panel wings · PCB component pads on hull',
    tag: 'PCB', tagClass: 'tag-pcb',
    draw(ctx, cx, cy, r, t) {
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Latitude grid
      ctx.lineWidth = 0.7;
      ctx.strokeStyle = 'rgba(0,255,65,0.35)';
      for (let i=-3;i<=3;i++) { const y=cy+i*(r/4); const dx=Math.sqrt(Math.max(0,r*r-(y-cy)**2)); if(dx>2){ctx.beginPath();ctx.moveTo(cx-dx,y);ctx.lineTo(cx+dx,y);ctx.stroke();} }
      for (let i=0;i<6;i++) { const a=i*Math.PI/3; ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r*0.1,cy+Math.sin(a)*r*0.1);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.stroke(); }
      // Docking arms
      ctx.strokeStyle = '#00ff41';
      ctx.lineWidth = 1.5;
      [[0,-1],[0,1],[1,0],[-1,0]].forEach(([dx,dy]) => {
        ctx.beginPath();
        ctx.moveTo(cx+dx*r, cy+dy*r);
        ctx.lineTo(cx+dx*(r+r*0.45), cy+dy*(r+r*0.45));
        ctx.stroke();
        // Arm end pad
        ctx.beginPath();
        ctx.rect(cx+dx*(r+r*0.4)-5, cy+dy*(r+r*0.4)-5, 10, 10);
        ctx.stroke();
      });
      // Solar panels on sides
      ctx.lineWidth = 1;
      [[-1,0],[1,0]].forEach(([dx]) => {
        const bx = cx + dx*(r + r*0.42);
        for (let p=-2;p<=2;p++) {
          ctx.beginPath();
          ctx.moveTo(bx-8, cy+p*8);
          ctx.lineTo(bx+8, cy+p*8);
          ctx.stroke();
        }
        ctx.beginPath(); ctx.rect(bx-9,cy-18,18,36); ctx.stroke();
      });
      // Equatorial ring detail
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(0,255,65,0.6)';
      ctx.beginPath(); ctx.arc(cx,cy,r*0.3,0,Math.PI*2); ctx.stroke();
    }
  },

  // 18. NEBULA WORLD — glowing diffuse haze planet
  {
    name: 'NEBULA CORE',
    desc: 'Newborn world · forming nebula haze · partial surface visible through gas cloud',
    tag: 'COLOR', tagClass: 'tag-color',
    draw(ctx, cx, cy, r, t) {
      // Outer nebula haze rings
      ctx.strokeStyle = 'rgba(0,180,255,0.15)';
      ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(cx,cy,r*1.3,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(100,0,255,0.1)';
      ctx.lineWidth = 12;
      ctx.beginPath(); ctx.arc(cx,cy,r*1.55,0,Math.PI*2); ctx.stroke();
      // Core planet
      ctx.save();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle = 'rgba(0,40,100,0.5)';
      ctx.fillRect(cx-r,cy-r,r*2,r*2);
      // Swirl bands
      ctx.strokeStyle = 'rgba(0,150,255,0.4)';
      ctx.lineWidth = 1;
      for (let i=-4;i<=4;i++) {
        const y=cy+i*(r/4.5);
        const dx=Math.sqrt(Math.max(0,r*r-(y-cy)**2));
        if(dx<2)continue;
        ctx.beginPath(); ctx.moveTo(cx-dx,y); ctx.lineTo(cx+dx,y); ctx.stroke();
      }
      ctx.restore();
      ctx.strokeStyle = '#0088ff';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      // Radial glow spokes
      ctx.strokeStyle = 'rgba(100,200,255,0.2)';
      ctx.lineWidth = 1;
      for (let i=0;i<12;i++) {
        const a = i*Math.PI*2/12;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
        ctx.lineTo(cx+Math.cos(a)*(r*1.7), cy+Math.sin(a)*(r*1.7));
        ctx.stroke();
      }
    }
  },

];

// ─── Render ──────────────────────────────────────────────────────────────────

const grid = document.getElementById('grid');

PLANETS.forEach((planet, idx) => {
  const card = document.createElement('div');
  card.className = 'card';

  const tag = document.createElement('div');
  tag.className = `tag ${planet.tagClass}`;
  tag.textContent = planet.tag;
  card.appendChild(tag);

  const canvas = document.createElement('canvas');
  canvas.width = SIZE;
  canvas.height = SIZE;
  card.appendChild(canvas);

  const label = document.createElement('div');
  label.className = 'card-label';
  label.innerHTML = `<div class="pname">${planet.name}</div><div class="pdesc">${planet.desc}</div>`;
  card.appendChild(label);

  grid.appendChild(card);

  // Animate
  let frame = 0;
  let animId = null;
  const ctx = canvas.getContext('2d');

  function renderFrame(t) {
    ctx.clearRect(0, 0, SIZE, SIZE);
    planet.draw(ctx, SIZE/2, SIZE/2, R, t);
  }

  function loop() {
    frame += 0.016;
    renderFrame(frame);
    animId = requestAnimationFrame(loop);
  }

  // Static render first
  renderFrame(0);

  // Animate on hover
  card.addEventListener('mouseenter', () => {
    if (!animId) loop();
  });
  card.addEventListener('mouseleave', () => {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    renderFrame(frame); // keep last frame
  });

  // Also do a gentle idle animation for star/sun
  if (planet.tag === 'STAR') {
    loop();
  }
});
</script>
</body>
</html>
