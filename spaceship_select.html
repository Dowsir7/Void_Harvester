<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELECT YOUR VESSEL</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020608;
    --panel: #080e12;
    --border: #0ff;
    --dim-border: #0a3a3a;
    --cyan: #00ffff;
    --green: #00ff88;
    --amber: #ffaa00;
    --red: #ff3355;
    --white: #e8f4f8;
    --muted: #3a6070;
    --tier1: #00ffff;
    --tier2: #00ff88;
    --tier3: #ffaa00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 70%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 90%, rgba(0,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 5%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 88%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 48% 32%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 55%, rgba(0,255,136,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-sub {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 5vw, 42px);
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 60px rgba(0,255,255,0.3);
    text-transform: uppercase;
  }

  .scanline-bar {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 14px auto 0;
  }

  /* Tier sections */
  .tier {
    margin-bottom: 44px;
  }

  .tier-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .tier-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 4px 12px;
    border: 1px solid;
    text-transform: uppercase;
  }

  .tier-line {
    flex: 1;
    height: 1px;
  }

  .tier-1 .tier-label { color: var(--tier1); border-color: var(--tier1); }
  .tier-1 .tier-line  { background: linear-gradient(90deg, var(--tier1), transparent); }
  .tier-2 .tier-label { color: var(--tier2); border-color: var(--tier2); }
  .tier-2 .tier-line  { background: linear-gradient(90deg, var(--tier2), transparent); }
  .tier-3 .tier-label { color: var(--tier3); border-color: var(--tier3); }
  .tier-3 .tier-line  { background: linear-gradient(90deg, var(--tier3), transparent); }

  /* Ship grid */
  .ship-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  /* Ship card */
  .ship-card {
    background: var(--panel);
    border: 1px solid var(--dim-border);
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    overflow: hidden;
  }

  .ship-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tier-1 .ship-card::before { background: radial-gradient(ellipse at 50% 40%, rgba(0,255,255,0.07), transparent 70%); }
  .tier-2 .ship-card::before { background: radial-gradient(ellipse at 50% 40%, rgba(0,255,136,0.07), transparent 70%); }
  .tier-3 .ship-card::before { background: radial-gradient(ellipse at 50% 40%, rgba(255,170,0,0.07), transparent 70%); }

  .ship-card:hover::before { opacity: 1; }

  .tier-1 .ship-card:hover { border-color: var(--tier1); box-shadow: 0 0 18px rgba(0,255,255,0.2); transform: translateY(-3px); }
  .tier-2 .ship-card:hover { border-color: var(--tier2); box-shadow: 0 0 18px rgba(0,255,136,0.2); transform: translateY(-3px); }
  .tier-3 .ship-card:hover { border-color: var(--tier3); box-shadow: 0 0 18px rgba(255,170,0,0.2); transform: translateY(-3px); }

  .ship-card.selected {
    transform: translateY(-3px);
  }
  .tier-1 .ship-card.selected { border-color: var(--tier1); box-shadow: 0 0 28px rgba(0,255,255,0.35), inset 0 0 20px rgba(0,255,255,0.05); }
  .tier-2 .ship-card.selected { border-color: var(--tier2); box-shadow: 0 0 28px rgba(0,255,136,0.35), inset 0 0 20px rgba(0,255,136,0.05); }
  .tier-3 .ship-card.selected { border-color: var(--tier3); box-shadow: 0 0 28px rgba(255,170,0,0.35), inset 0 0 20px rgba(255,170,0,0.05); }

  .ship-card svg {
    display: block;
    transition: filter 0.2s;
  }

  .tier-1 .ship-card.selected svg { filter: drop-shadow(0 0 6px var(--tier1)); }
  .tier-2 .ship-card.selected svg { filter: drop-shadow(0 0 6px var(--tier2)); }
  .tier-3 .ship-card.selected svg { filter: drop-shadow(0 0 6px var(--tier3)); }

  .ship-card:hover svg {
    animation: throb 0.8s ease-in-out infinite alternate;
  }

  @keyframes throb {
    from { transform: scale(1); }
    to   { transform: scale(1.04); }
  }

  .ship-info { width: 100%; }

  .ship-name {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 10px;
  }
  .tier-1 .ship-name { color: var(--tier1); }
  .tier-2 .ship-name { color: var(--tier2); }
  .tier-3 .ship-name { color: var(--tier3); }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 5px;
  }

  .stat-bar {
    width: 80px;
    height: 3px;
    background: #0a1a22;
    border-radius: 2px;
    overflow: hidden;
  }

  .stat-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .tier-1 .stat-fill { background: var(--tier1); }
  .tier-2 .stat-fill { background: var(--tier2); }
  .tier-3 .stat-fill { background: var(--tier3); }

  /* Corner decoration on selected */
  .ship-card.selected::after {
    content: '◄ SELECTED ►';
    position: absolute;
    bottom: 5px;
    left: 0; right: 0;
    text-align: center;
    font-size: 8px;
    letter-spacing: 2px;
    opacity: 0.6;
  }
  .tier-1 .ship-card.selected::after { color: var(--tier1); }
  .tier-2 .ship-card.selected::after { color: var(--tier2); }
  .tier-3 .ship-card.selected::after { color: var(--tier3); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
  }

  .confirm-btn {
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 5px;
    padding: 14px 48px;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    background: transparent;
    cursor: pointer;
    text-transform: uppercase;
    margin-bottom: 20px;
    transition: background 0.2s, box-shadow 0.2s, color 0.2s;
  }

  .confirm-btn:hover {
    background: var(--cyan);
    color: var(--bg);
    box-shadow: 0 0 30px rgba(0,255,255,0.4);
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-sub">GALACTIC COMMAND // VESSEL ASSIGNMENT</div>
    <h1>SELECT YOUR SHIP</h1>
    <div class="scanline-bar"></div>
  </div>

  <!-- TIER 1 -->
  <div class="tier tier-1">
    <div class="tier-header">
      <div class="tier-label">TIER I — SCOUT CLASS</div>
      <div class="tier-line"></div>
    </div>
    <div class="ship-grid" id="tier1-grid"></div>
  </div>

  <!-- TIER 2 -->
  <div class="tier tier-2">
    <div class="tier-header">
      <div class="tier-label">TIER II — FIGHTER CLASS</div>
      <div class="tier-line"></div>
    </div>
    <div class="ship-grid" id="tier2-grid"></div>
  </div>

  <!-- TIER 3 -->
  <div class="tier tier-3">
    <div class="tier-header">
      <div class="tier-label">TIER III — APEX CLASS</div>
      <div class="tier-line"></div>
    </div>
    <div class="ship-grid" id="tier3-grid"></div>
  </div>

  <div class="footer">
    <button class="confirm-btn" onclick="confirmSelection()">CONFIRM VESSEL</button>
    <div id="selection-status">— NO VESSEL SELECTED —</div>
  </div>

</div>

<script>
// ─── Ship definitions ───────────────────────────────────────────────────────
// Each ship has: name, tier, stats, and a draw function (ctx, cx, cy, s, color)

const SHIPS = [

  // ── TIER 1: SCOUT CLASS ──────────────────────────────────────────────────

  {
    id: 'dart',
    name: 'DART MK-I',
    tier: 1,
    stats: { speed: 85, armor: 20, firepower: 30 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.04;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Slim needle hull
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s*0.28, cy + s*0.6);
      ctx.lineTo(cx, cy + s*0.35);
      ctx.lineTo(cx - s*0.28, cy + s*0.6);
      ctx.closePath();
      ctx.stroke();
      // Cockpit line
      ctx.beginPath();
      ctx.moveTo(cx - s*0.1, cy - s*0.4);
      ctx.lineTo(cx + s*0.1, cy - s*0.4);
      ctx.stroke();
      // Single engine
      ctx.beginPath();
      ctx.moveTo(cx - s*0.1, cy + s*0.35);
      ctx.lineTo(cx - s*0.1, cy + s*0.7);
      ctx.lineTo(cx + s*0.1, cy + s*0.7);
      ctx.lineTo(cx + s*0.1, cy + s*0.35);
      ctx.stroke();
    }
  },

  {
    id: 'wasp',
    name: 'WASP SCOUT',
    tier: 1,
    stats: { speed: 90, armor: 15, firepower: 25 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.04;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Thin delta hull
      ctx.beginPath();
      ctx.moveTo(cx, cy - s*0.9);
      ctx.lineTo(cx + s*0.5, cy + s*0.7);
      ctx.lineTo(cx + s*0.15, cy + s*0.45);
      ctx.lineTo(cx, cy + s*0.55);
      ctx.lineTo(cx - s*0.15, cy + s*0.45);
      ctx.lineTo(cx - s*0.5, cy + s*0.7);
      ctx.closePath();
      ctx.stroke();
      // Cockpit bubble
      ctx.beginPath();
      ctx.arc(cx, cy - s*0.35, s*0.13, 0, Math.PI*2);
      ctx.stroke();
      // Center spine
      ctx.beginPath();
      ctx.moveTo(cx, cy - s*0.22);
      ctx.lineTo(cx, cy + s*0.55);
      ctx.stroke();
    }
  },

  {
    id: 'arrow',
    name: 'ARROW-9',
    tier: 1,
    stats: { speed: 75, armor: 30, firepower: 40 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.04;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Blocky arrow shape
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s*0.4, cy - s*0.1);
      ctx.lineTo(cx + s*0.4, cy + s*0.3);
      ctx.lineTo(cx + s*0.2, cy + s*0.3);
      ctx.lineTo(cx + s*0.2, cy + s*0.7);
      ctx.lineTo(cx - s*0.2, cy + s*0.7);
      ctx.lineTo(cx - s*0.2, cy + s*0.3);
      ctx.lineTo(cx - s*0.4, cy + s*0.3);
      ctx.lineTo(cx - s*0.4, cy - s*0.1);
      ctx.closePath();
      ctx.stroke();
      // Cockpit slit
      ctx.beginPath();
      ctx.moveTo(cx - s*0.12, cy - s*0.5);
      ctx.lineTo(cx + s*0.12, cy - s*0.5);
      ctx.stroke();
    }
  },

  // ── TIER 2: FIGHTER CLASS ─────────────────────────────────────────────────

  {
    id: 'falcon',
    name: 'FALCON-X',
    tier: 2,
    stats: { speed: 70, armor: 55, firepower: 65 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.045;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Main hull
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.bezierCurveTo(cx + s*0.5, cy - s*0.2, cx + s*0.42, cy + s*0.6, cx, cy + s*0.45);
      ctx.bezierCurveTo(cx - s*0.42, cy + s*0.6, cx - s*0.5, cy - s*0.2, cx, cy - s);
      ctx.stroke();
      // Cockpit canopy
      ctx.beginPath();
      ctx.moveTo(cx - s*0.15, cy - s*0.38);
      ctx.bezierCurveTo(cx - s*0.18, cy - s*0.68, cx + s*0.18, cy - s*0.68, cx + s*0.15, cy - s*0.38);
      ctx.stroke();
      // Left swept wing
      ctx.beginPath();
      ctx.moveTo(cx - s*0.32, cy + s*0.05);
      ctx.lineTo(cx - s*0.9, cy + s*0.6);
      ctx.lineTo(cx - s*0.32, cy + s*0.5);
      ctx.stroke();
      // Right swept wing
      ctx.beginPath();
      ctx.moveTo(cx + s*0.32, cy + s*0.05);
      ctx.lineTo(cx + s*0.9, cy + s*0.6);
      ctx.lineTo(cx + s*0.32, cy + s*0.5);
      ctx.stroke();
      // Twin nacelles
      [[cx - s*0.22, cx - s*0.1], [cx + s*0.1, cx + s*0.22]].forEach(([l, r]) => {
        ctx.beginPath();
        ctx.moveTo(l, cy + s*0.38);
        ctx.lineTo(l, cy + s*0.75);
        ctx.lineTo(r, cy + s*0.75);
        ctx.lineTo(r, cy + s*0.38);
        ctx.stroke();
      });
    }
  },

  {
    id: 'raptor',
    name: 'RAPTOR-II',
    tier: 2,
    stats: { speed: 60, armor: 70, firepower: 60 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.045;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Wide wedge hull
      ctx.beginPath();
      ctx.moveTo(cx, cy - s*0.95);
      ctx.lineTo(cx + s*0.6, cy + s*0.3);
      ctx.lineTo(cx + s*0.35, cy + s*0.55);
      ctx.lineTo(cx + s*0.35, cy + s*0.8);
      ctx.lineTo(cx - s*0.35, cy + s*0.8);
      ctx.lineTo(cx - s*0.35, cy + s*0.55);
      ctx.lineTo(cx - s*0.6, cy + s*0.3);
      ctx.closePath();
      ctx.stroke();
      // Cockpit
      ctx.beginPath();
      ctx.moveTo(cx, cy - s*0.95);
      ctx.lineTo(cx + s*0.12, cy - s*0.4);
      ctx.lineTo(cx - s*0.12, cy - s*0.4);
      ctx.closePath();
      ctx.stroke();
      // Engine detail
      ctx.beginPath();
      ctx.moveTo(cx - s*0.35, cy + s*0.55);
      ctx.lineTo(cx + s*0.35, cy + s*0.55);
      ctx.stroke();
      // Wing strakes
      ctx.beginPath();
      ctx.moveTo(cx + s*0.12, cy - s*0.1);
      ctx.lineTo(cx + s*0.5, cy + s*0.28);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - s*0.12, cy - s*0.1);
      ctx.lineTo(cx - s*0.5, cy + s*0.28);
      ctx.stroke();
    }
  },

  {
    id: 'viper',
    name: 'VIPER-VII',
    tier: 2,
    stats: { speed: 80, armor: 50, firepower: 70 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.045;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Hull with forward sweep
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s*0.18, cy - s*0.3);
      ctx.lineTo(cx + s*0.55, cy + s*0.0);
      ctx.lineTo(cx + s*0.55, cy + s*0.35);
      ctx.lineTo(cx + s*0.2, cy + s*0.55);
      ctx.lineTo(cx + s*0.2, cy + s*0.75);
      ctx.lineTo(cx - s*0.2, cy + s*0.75);
      ctx.lineTo(cx - s*0.2, cy + s*0.55);
      ctx.lineTo(cx - s*0.55, cy + s*0.35);
      ctx.lineTo(cx - s*0.55, cy + s*0.0);
      ctx.lineTo(cx - s*0.18, cy - s*0.3);
      ctx.closePath();
      ctx.stroke();
      // Inner cockpit
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s*0.1, cy - s*0.3);
      ctx.lineTo(cx - s*0.1, cy - s*0.3);
      ctx.closePath();
      ctx.stroke();
      // Horizontal crossbar
      ctx.beginPath();
      ctx.moveTo(cx - s*0.55, cy + s*0.18);
      ctx.lineTo(cx + s*0.55, cy + s*0.18);
      ctx.stroke();
    }
  },

  // ── TIER 3: APEX CLASS ────────────────────────────────────────────────────

  {
    id: 'wraith',
    name: 'WRAITH ZERO',
    tier: 3,
    stats: { speed: 95, armor: 75, firepower: 90 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.05;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Sleek curved hull
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.bezierCurveTo(cx + s*0.08, cy - s*0.5, cx + s*0.6, cy - s*0.1, cx + s*0.7, cy + s*0.5);
      ctx.bezierCurveTo(cx + s*0.5, cy + s*0.45, cx + s*0.15, cy + s*0.55, cx, cy + s*0.4);
      ctx.bezierCurveTo(cx - s*0.15, cy + s*0.55, cx - s*0.5, cy + s*0.45, cx - s*0.7, cy + s*0.5);
      ctx.bezierCurveTo(cx - s*0.6, cy - s*0.1, cx - s*0.08, cy - s*0.5, cx, cy - s);
      ctx.stroke();
      // Inner hull line
      ctx.beginPath();
      ctx.moveTo(cx, cy - s*0.6);
      ctx.bezierCurveTo(cx + s*0.25, cy - s*0.3, cx + s*0.35, cy + s*0.2, cx + s*0.18, cy + s*0.42);
      ctx.moveTo(cx, cy - s*0.6);
      ctx.bezierCurveTo(cx - s*0.25, cy - s*0.3, cx - s*0.35, cy + s*0.2, cx - s*0.18, cy + s*0.42);
      ctx.stroke();
      // Cockpit
      ctx.beginPath();
      ctx.ellipse(cx, cy - s*0.55, s*0.1, s*0.18, 0, 0, Math.PI*2);
      ctx.stroke();
      // Tri-nacelles
      [[-s*0.45, -s*0.28], [cx - s*0.1, cx + s*0.1], [s*0.28, s*0.45]].forEach((pair, i) => {
        let lx, rx;
        if (i === 0) { lx = cx + pair[0]; rx = cx + pair[1]; }
        else if (i === 1) { lx = pair[0]; rx = pair[1]; }
        else { lx = cx + pair[0]; rx = cx + pair[1]; }
        ctx.beginPath();
        ctx.moveTo(lx, cy + s*0.42);
        ctx.lineTo(lx, cy + s*0.85);
        ctx.lineTo(rx, cy + s*0.85);
        ctx.lineTo(rx, cy + s*0.42);
        ctx.stroke();
      });
    }
  },

  {
    id: 'sovereign',
    name: 'SOVEREIGN',
    tier: 3,
    stats: { speed: 75, armor: 95, firepower: 95 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.05;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Massive angular hull
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s*0.25, cy - s*0.5);
      ctx.lineTo(cx + s*0.65, cy - s*0.1);
      ctx.lineTo(cx + s*0.8, cy + s*0.35);
      ctx.lineTo(cx + s*0.5, cy + s*0.65);
      ctx.lineTo(cx + s*0.5, cy + s*0.85);
      ctx.lineTo(cx - s*0.5, cy + s*0.85);
      ctx.lineTo(cx - s*0.5, cy + s*0.65);
      ctx.lineTo(cx - s*0.8, cy + s*0.35);
      ctx.lineTo(cx - s*0.65, cy - s*0.1);
      ctx.lineTo(cx - s*0.25, cy - s*0.5);
      ctx.closePath();
      ctx.stroke();
      // Cockpit fortress
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s*0.18, cy - s*0.48);
      ctx.lineTo(cx + s*0.18, cy - s*0.15);
      ctx.lineTo(cx - s*0.18, cy - s*0.15);
      ctx.lineTo(cx - s*0.18, cy - s*0.48);
      ctx.closePath();
      ctx.stroke();
      // Cross-deck struts
      ctx.beginPath();
      ctx.moveTo(cx - s*0.65, cy + s*0.1);
      ctx.lineTo(cx + s*0.65, cy + s*0.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - s*0.5, cy + s*0.65);
      ctx.lineTo(cx + s*0.5, cy + s*0.65);
      ctx.stroke();
      // Port cannon barrels
      [-s*0.62, -s*0.2, s*0.2, s*0.62].forEach(ox => {
        ctx.beginPath();
        ctx.moveTo(cx + ox, cy - s*0.1);
        ctx.lineTo(cx + ox, cy - s*0.45);
        ctx.stroke();
      });
    }
  },

  {
    id: 'nemesis',
    name: 'NEMESIS-∞',
    tier: 3,
    stats: { speed: 85, armor: 88, firepower: 100 },
    draw(ctx, cx, cy, s, col) {
      ctx.strokeStyle = col;
      ctx.lineWidth = s * 0.05;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      // Organic predator hull
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.bezierCurveTo(cx + s*0.55, cy - s*0.3, cx + s*0.5, cy + s*0.4, cx + s*0.3, cy + s*0.6);
      ctx.lineTo(cx + s*0.55, cy + s*0.9);
      ctx.lineTo(cx, cy + s*0.65);
      ctx.lineTo(cx - s*0.55, cy + s*0.9);
      ctx.lineTo(cx - s*0.3, cy + s*0.6);
      ctx.bezierCurveTo(cx - s*0.5, cy + s*0.4, cx - s*0.55, cy - s*0.3, cx, cy - s);
      ctx.stroke();
      // Central spine
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx, cy + s*0.65);
      ctx.stroke();
      // Rib lines
      [[-s*0.3, -s*0.1], [-s*0.1, s*0.1], [s*0.15, s*0.3]].forEach(([top, bot]) => {
        ctx.beginPath();
        ctx.moveTo(cx, cy + top);
        ctx.lineTo(cx + s*0.42, cy + bot);
        ctx.moveTo(cx, cy + top);
        ctx.lineTo(cx - s*0.42, cy + bot);
        ctx.stroke();
      });
      // Cockpit visor
      ctx.beginPath();
      ctx.moveTo(cx - s*0.12, cy - s*0.55);
      ctx.lineTo(cx + s*0.12, cy - s*0.55);
      ctx.lineTo(cx + s*0.08, cy - s*0.75);
      ctx.lineTo(cx - s*0.08, cy - s*0.75);
      ctx.closePath();
      ctx.stroke();
      // Twin forward guns
      ctx.beginPath();
      ctx.moveTo(cx + s*0.22, cy - s*0.35);
      ctx.lineTo(cx + s*0.22, cy - s*0.85);
      ctx.moveTo(cx - s*0.22, cy - s*0.35);
      ctx.lineTo(cx - s*0.22, cy - s*0.85);
      ctx.stroke();
    }
  }
];

// ─── Render ──────────────────────────────────────────────────────────────────

const TIER_COLORS = { 1: '#00ffff', 2: '#00ff88', 3: '#ffaa00' };
const TIER_NAMES  = { 1: 'tier1-grid', 2: 'tier2-grid', 3: 'tier3-grid' };

let selectedId = null;

function createShipCard(ship) {
  const card = document.createElement('div');
  card.className = 'ship-card';
  card.dataset.id = ship.id;

  // Canvas
  const size = 110;
  const canvas = document.createElement('canvas');
  canvas.width  = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const pad = 10;
  ship.draw(ctx, size/2, size/2 - pad, (size/2) - pad*2, TIER_COLORS[ship.tier]);
  card.appendChild(canvas);

  // Info
  const info = document.createElement('div');
  info.className = 'ship-info';

  const name = document.createElement('div');
  name.className = 'ship-name';
  name.textContent = ship.name;
  info.appendChild(name);

  [['SPD', ship.stats.speed], ['ARM', ship.stats.armor], ['PWR', ship.stats.firepower]].forEach(([label, val]) => {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `<span>${label}</span><div class="stat-bar"><div class="stat-fill" style="width:${val}%"></div></div>`;
    info.appendChild(row);
  });

  card.appendChild(info);

  card.addEventListener('click', () => selectShip(ship.id));
  return card;
}

function selectShip(id) {
  document.querySelectorAll('.ship-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) card.classList.add('selected');
  selectedId = id;
  const ship = SHIPS.find(s => s.id === id);
  document.getElementById('selection-status').textContent = `VESSEL ASSIGNED: ${ship.name}`;
}

function confirmSelection() {
  if (!selectedId) {
    document.getElementById('selection-status').textContent = '⚠ SELECT A VESSEL FIRST';
    return;
  }
  const ship = SHIPS.find(s => s.id === selectedId);
  alert(`Launching with ${ship.name}. Good hunting, Commander.`);
}

// Mount cards
SHIPS.forEach(ship => {
  const grid = document.getElementById(TIER_NAMES[ship.tier]);
  grid.appendChild(createShipCard(ship));
});
</script>
</body>
</html>
